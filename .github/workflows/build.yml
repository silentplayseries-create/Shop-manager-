name: Build Debug APK

# Runs automatically whenever ShopManager.zip is pushed/updated.
# Can also be triggered manually from the repo's "Actions" tab.
on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Unzip project
        run: unzip -o ShopManager.zip -d .

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Build debug APK
        run: gradle assembleDebug --no-daemon
        working-directory: ./ShopManager

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ShopManager-debug-apk
          path: ShopManager/app/build/outputs/apk/debug/app-debug.apk
